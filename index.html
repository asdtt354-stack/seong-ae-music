<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>에임(EAIM) 메이커 🌿</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 100%; border-top: 10px solid #2c5e77; }
        h1 { color: #2c5e77; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 0.9rem; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; resize: none; box-sizing: border-box; }
        .btn { width: 100%; background: #2c5e77; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #1e3f52; }
        .loading { display: none; text-align: center; color: #e67e22; font-weight: bold; margin-top: 20px; }
        .result-box { margin-top: 30px; display: none; background: #f9fbfd; padding: 25px; border-radius: 15px; border: 1px solid #d6e4ed; }
        h3 { color: #2c5e77; border-bottom: 2px solid #2c5e77; padding-bottom: 5px; display: inline-block; }
        pre { white-space: pre-wrap; word-wrap: break-word; line-height: 1.8; color: #34495e; font-size: 1.05rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>에임(EAIM) 메이커 🌿</h1>
    <p class="subtitle">Emotion · Artscape · Interactive · Musicalization<br>정서 지능을 깨우는 예술 융합 학습 도구</p>
    <p>📝 오늘의 마음을 한 줄의 글로 들려주세요</p>
    <textarea id="userInput" placeholder="예: 운동장에서 친구들과 놀 때 제일 행복해요!"></textarea>
    <button class="btn" onclick="generateArt()">✨ 예술 작품으로 변환하기</button>
    <div id="loading" class="loading">에임 엔진이 감정을 분석하여 예술로 빚어내는 중입니다... ⏳</div>
    <div id="resultArea" class="result-box">
        <h3>📖 에임 포엠 (오늘의 시)</h3>
        <pre id="poemDisplay"></pre>
        <br>
        <h3>🎹 뮤토니즈 뮤직 (수노 프롬프트)</h3>
        <pre id="musicDisplay"></pre>
    </div>
</div>

<script>
    async function generateArt() {
        const apiKey = "AIzaSyD9JwzBCGb8idv-pi3zUchRQeSwR2ELT9k";
        const text = document.getElementById('userInput').value;

        if (!text) { alert("마음을 입력해 주세요!"); return; }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        // 엔진 주소 형식을 v1beta/models/gemini-1.5-flash:generateContent 로 정확히 맞췄습니다.
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        const prompt = `아이의 글: "${text}"\n\n위 글을 읽고 따뜻한 위로와 공감이 담긴 4-6행의 시를 지어주고, 어울리는 음악 스타일을 추천해줘. 반드시 다음 JSON 형식으로만 답해줘: { "poem": "시 내용", "music": "음악 스타일" }`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json" } 
                })
            });

            const data = await response.json();
            
            if (data.error) {
                alert("엔진 응답 오류: " + data.error.message);
                return;
            }

            const result = JSON.parse(data.candidates[0].content.parts[0].text);
            document.getElementById('poemDisplay').innerText = result.poem;
            document.getElementById('musicDisplay').innerText = result.music;
            document.getElementById('resultArea').style.display = 'block';
        } catch (error) {
            console.error(error);
            alert("연결 일시 지연! 잠시 후 다시 시도해 주세요.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
