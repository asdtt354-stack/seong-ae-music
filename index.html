<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAIM Guitar v4.1 | Powered by Gemini</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3a;
    --accent: #7c5cfc; --accent2: #fc5c7d; --accent3: #5cf0a0;
    --text: #e8e8f0; --muted: #6b6b8a;
    --bass: #fc5c7d; --keys: #fca05c; --guitar: #7c5cfc; --drum: #5cf0a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; position: relative; z-index: 1; }

  .header { text-align: center; padding: 2rem 0 2.5rem; }
  .logo { font-family: 'Space Mono', monospace; font-size: 2.2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .version-badge { display: inline-block; margin-top: 0.5rem; font-family: 'Space Mono', monospace; font-size: 0.7rem; padding: 0.2rem 0.7rem; background: rgba(124,92,252,0.15); border: 1px solid var(--accent); border-radius: 99px; color: var(--accent); }

  .sel-card { background: linear-gradient(145deg, #1e1e2e, #13131a); border: 1px solid var(--accent); border-radius: 16px; padding: 1.2rem; margin: 1.5rem 0; box-shadow: 0 10px 30px rgba(124,92,252,0.1); }
  .sel-title { font-size: 0.85rem; font-weight: 700; color: var(--accent3); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .sel-question { font-size: 0.95rem; line-height: 1.6; color: var(--text); }

  .upload-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 2.5rem; text-align: center; cursor: pointer; transition: all 0.3s; background: var(--surface); margin-bottom: 1.5rem; }
  .btn-analyze { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 2rem; }
  .results { display: none; }
  .results.show { display: block; }
  
  .track-mixer { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; }
  .track-row { display: flex; align-items: center; gap: 0.8rem; background: var(--surface2); border-radius: 12px; padding: 0.8rem 1rem; border: 1px solid var(--border); margin-bottom: 0.5rem; }
  .track-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
  .track-btn.active { background: var(--accent2); color: white; }

  .chord-timeline { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .chord-pill { font-family: 'Space Mono', monospace; padding: 0.4rem 1rem; border-radius: 99px; border: 1px solid var(--border); cursor: pointer; }
  .chord-pill.active { border-color: var(--accent); background: rgba(124,92,252,0.2); }
  
  canvas#fretboard { display: block; border-radius: 8px; width: 100%; max-width: 700px; height: auto; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">⭐ EAIM Guitar</div>
    <div class="tagline">지능형 화성 분석 · SEL 교육용 앱</div>
    <div class="version-badge">v4.1 — Gemini Sound & Visual Engine 이식</div>
  </div>

  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <span style="font-size: 2.5rem;">🎵</span>
    <div style="font-weight: 500; margin-top: 0.8rem;">음악 파일을 업로드하여 분석을 시작하세요</div>
    <input type="file" id="fileInput" accept="audio/*" style="display:none">
  </div>

  <button class="btn-analyze" id="btnAnalyze" disabled onclick="startAnalysis()">🎸 트랙 분리 + 지능형 화성 분석</button>

  <div id="progressWrap" style="display:none; margin-bottom: 2rem;">
    <div id="progressLabel" style="font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem;">분석 중...</div>
    <div style="height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden;">
      <div id="progressFill" style="height: 100%; background: var(--accent); width: 0%; transition: width 0.4s;"></div>
    </div>
  </div>

  <div class="results" id="results">
    <div class="sel-card">
      <div class="sel-title">✨ 오늘의 음악적 성찰 (EAIM SEL)</div>
      <div class="sel-question" id="selQuestion">음악을 분석하고 있습니다. 곧 당신을 위한 질문이 도착합니다.</div>
    </div>

    <div class="track-mixer">
      <div style="font-size: 0.9rem; font-weight: 700; margin-bottom: 1rem;">🎚️ 트랙 믹서 및 분리</div>
      <div id="trackList"></div>
      <div style="display: flex; align-items: center; gap: 1rem; margin-top: 1.5rem; background: var(--surface2); padding: 1rem; border-radius: 12px;">
        <button id="playPauseBtn" onclick="togglePlayback()" style="width: 50px; height: 50px; border-radius: 50%; border:none; background: var(--accent); color:white; cursor:pointer
