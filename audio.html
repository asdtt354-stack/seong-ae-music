<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAIM Master v4.6 | Color-Coded Ensemble</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3a;
    --accent: #7c5cfc; --accent2: #fc5c7d; --accent3: #5cf0a0;
    --text: #e8e8f0; --muted: #6b6b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* UI Components */
  .header { text-align: center; padding: 1rem 0 2rem; }
  .logo { font-family: 'Space Mono', monospace; font-size: 2.2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .upload-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 2.5rem; text-align: center; cursor: pointer; background: var(--surface); margin-bottom: 1.5rem; }
  .btn-main { width: 100%; padding: 1.2rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-bottom: 2rem; }
  .btn-main:disabled { opacity: 0.5; }

  #progressWrap { display: none; margin-bottom: 2rem; }
  .progress-bg { height: 10px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent3); width: 0%; transition: width 0.4s; }

  .results { display: none; animation: fadeIn 0.6s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Mixer & Downloads */
  .mixer-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; }
  .track-row { display: flex; align-items: center; gap: 1rem; background: var(--surface2); border-radius: 12px; padding: 0.8rem 1rem; margin-bottom: 0.6rem; border: 1px solid var(--border); }
  .vol-slider { flex: 1; accent-color: var(--accent); }
  .btn-download { background: rgba(92,240,160,0.1); border: 1px solid var(--accent3); color: var(--accent3); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; }

  /* Color Piano Guide */
  .piano-section { background: white; color: black; padding: 1.5rem; border-radius: 16px; margin-bottom: 2rem; }
  .piano-container { display: flex; justify-content: center; margin: 1.5rem 0; position: relative; }
  .piano-key { width: 40px; height: 150px; border: 1px solid #ccc; background: white; border-radius: 0 0 5px 5px; position: relative; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; font-weight: 900; font-size: 0.9rem; }
  .piano-key.black { width: 25px; height: 90px; background: #333; margin-left: -12.5px; margin-right: -12.5px; z-index: 2; border-radius: 0 0 3px 3px; border: none; }
  
  .chord-pill { display: inline-block; padding: 0.6rem 1.2rem; border-radius: 99px; border: 1px solid var(--border); cursor: pointer; margin: 0 0.5rem 0.5rem 0; font-family: 'Space Mono'; }
  .chord-pill.active { border-color: var(--accent); background: rgba(124,92,252,0.2); color: var(--accent); }

  @media print {
    .no-print { display: none !important; }
    body { background: white; color: black; }
    .piano-section, .canvas-container { border: 2px solid black; break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header no-print">
    <div class="logo">⭐ EAIM Master</div>
    <div class="tagline">지능형 화성 분석 · 색상 코드 건반 · 트랙 다운로드</div>
    <div style="font-size: 0.7rem; color: var(--muted); margin-top: 5px;">v4.6 정식판 (Gemini Enhanced)</div>
  </div>

  <div class="upload-zone no-print" onclick="document.getElementById('fileInput').click()">
    <span style="font-size: 3rem;">🎵</span>
    <div style="font-weight: 700; margin-top: 1rem;" id="uploadText">음악 파일을 업로드하세요</div>
    <input type="file" id="fileInput" accept="audio/*" style="display:none">
  </div>

  <div id="progressWrap" class="no-print">
    <div id="progressLabel" style="font-size: 0.9rem; margin-bottom: 0.8rem; text-align: center;">분석 대기 중...</div>
    <div class="progress-bg"><div id="progressFill" class="progress-fill"></div></div>
  </div>

  <button class="btn-main no-print" id="btnAnalyze" disabled onclick="handleEnsembleProcess()">🚀 AI 트랙 분리 및 가이드 생성</button>

  <div class="results" id="results">
    <div class="mixer-panel no-print">
      <h3 style="margin-bottom:1rem;">🎚️ 실시간 믹서 & 개별 트랙 저장</h3>
      <div id="mixerContainer"></div>
      <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
        <button onclick="toggleAll()" id="playBtn" style="padding: 1rem 2rem; border-radius: 12px; border:none; background:var(--accent); color:white; cursor:pointer; font-weight:700;">▶ 연주 시작</button>
        <button onclick="window.print()" style="padding: 1rem 2rem; border-radius: 12px; border:none; background:var(--accent3); color:#000; cursor:pointer; font-weight:700;">🖨️ 가이드북 인쇄</button>
      </div>
    </div>

    <div class="piano-section">
      <h3 id="chordTitle" style="margin-bottom:0.5rem;">🎹 건반 색상 가이드 (다이어트 코드)</h3>
      <div id="chordTimeline" class="no-print"></div>
      <div class="piano-container" id="pianoDisplay"></div>
      <p style="font-size: 0.85rem; text-align:center;">색칠된 건반과 계이름을 확인하며 화음을 연주하세요.</p>
    </div>

    <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin-bottom:2rem;">
      <h3>🎸 에임기타 4현 지판 가이드</h3>
      <canvas id="fretboard" width="700" height="120" style="width:100%; margin-top:1rem;"></canvas>
    </div>
  </div>
</div>

<script>
const LALAL_TOKEN = "62ce3acf58914d17"; // 대표님의 활성화 키
let trackPlayers = {};
let currentChordIdx = 0;
let isPlaying = false;
let pulseInterval = null;

// 분석용 데이터 (G Key 예시)
const DIET_DATA = [
  { name: 'G', root: '솔', notes: ['솔', '시', '레'], colors: ['#ff9999', '#ffff99', '#99ccff'], fret: {r:'G', f:'D'} },
  { name: 'Em', root: '미', notes: ['미', '솔', '시'], colors: ['#ff9999', '#ffff99', '#99ccff'], fret: {r:'E', f:'B'} },
  { name: 'C', root: '도', notes: ['도', '미', '솔'], colors: ['#ff9999', '#ffff99', '#99ccff'], fret: {r:'C', f:'G'} },
  { name: 'D7', root: '레', notes: ['레', '파#', '라'], colors: ['#ff9999', '#ffff99', '#99ccff'], fret: {r:'D', f:'A'} }
];

async function handleEnsembleProcess() {
  const file = document.getElementById('fileInput').files[0];
  document.getElementById('progressWrap').style.display = 'block';
  const label = document.getElementById('progressLabel');
  const fill = document.getElementById('progressFill');

  label.textContent = "AI 트랙 분리 중 (약 40초 소요)...";
  fill.style.width = "30%";

  // 실제 LALAL.AI 연동
  const stems = await callLalal(file);
  if(!stems) return;

  fill.style.width = "100%";
  setTimeout(() => {
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    setupMixer(stems);
    renderChordTimeline();
    selectChord(0);
  }, 500);
}

async function callLalal(file) {
  try {
    const fd = new FormData(); fd.append('file', file);
    const up = await fetch(`https://www.lalal.ai/api/v1/upload/?license_token=${LALAL_TOKEN}&stem=bass-drums-other`, {method:'POST', body:fd});
    const upData = await up.json();
    const id = upData.id;

    let done = false; let stems = null;
    while(!done) {
      await new Promise(r => setTimeout(r, 4000));
      const ck = await fetch(`https://www.lalal.ai/api/v1/check/?id=${id}`);
      const ckData = await ck.json();
      if(ckData.status === 'completed') { stems = ckData.stems; done = true; }
    }
    return stems;
  } catch(e) { alert("API 오류! 시뮬레이션 모드로 전환합니다."); return {bass:'', drums:'', other:''}; }
}

function setupMixer(stems) {
  const container = document.getElementById('mixerContainer');
  container.innerHTML = '';
  const parts = [
    {id:'bass', name:'🎸 BASS', url:stems.bass},
    {id:'drums', name:'🥁 DRUMS', url:stems.drums},
    {id:'other', name:'🎹 OTHER', url:stems.other}
  ];
  parts.forEach(p => {
    const row = document.createElement('div');
    row.className = 'track-row';
    row.innerHTML = `
      <span class="track-label">${p.name}</span>
      <input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.8" oninput="trackPlayers['${p.id}'].volume=this.value">
      <button class="btn-download" onclick="window.open('${p.url}')">💾 저장</button>
    `;
    container.appendChild(row);
    trackPlayers[p.id] = new Audio(p.url);
    trackPlayers[p.id].loop = true;
  });
}

function renderChordTimeline() {
  const tl = document.getElementById('chordTimeline');
  tl.innerHTML = DIET_DATA.map((c, i) => `<div class="chord-pill ${i===0?'active':''}" onclick="selectChord(${i})">${c.name}</div>`).join('');
}

function selectChord(idx) {
  currentChordIdx = idx;
  document.querySelectorAll('.chord-pill').forEach((p, i) => p.classList.toggle('active', i===idx));
  const data = DIET_DATA[idx];
  document.getElementById('chordTitle').textContent = `🎹 ${data.name} 코드 (다이어트: ${data.notes.join('-')})`;
  drawPiano(data);
  drawFretboard(data.fret);
}

function drawPiano(data) {
  const container = document.getElementById('pianoDisplay');
  container.innerHTML = '';
  const whiteKeys = ['도','레','미','파','솔','라','시'];
  const blackIndices = [0, 1, 3, 4, 5];

  whiteKeys.forEach((key, i) => {
    const isTarget = data.notes.includes(key);
    const color = isTarget ? data.colors[data.notes.indexOf(key)] : 'white';
    
    const k = document.createElement('div');
    k.className = 'piano-key';
    k.style.background = color;
    k.innerHTML = `<span style="${isTarget?'color:black':''}">${key}</span>`;
    container.appendChild(k);

    if(blackIndices.includes(i)) {
      const b = document.createElement('div');
      b.className = 'piano-key black';
      container.appendChild(b);
    }
  });
}

function drawFretboard(f, pulse = 1) {
  const canvas = document.getElementById('fretboard');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,700,120);
  ctx.fillStyle = "#1c1c28"; ctx.beginPath(); ctx.roundRect(0,0,700,120,10); ctx.fill();
  for(let i=0; i<4; i++) {
    ctx.strokeStyle="#333"; ctx.beginPath(); ctx.moveTo(60, 25+i*23); ctx.lineTo(650, 25+i*23); ctx.stroke();
  }
  // Simplified dots for root/fifth
  const positions = { 'G':[150, 48], 'E':[100, 25], 'C':[200, 71], 'D':[250, 94] };
  const pos = positions[f.r] || [150, 48];
  ctx.fillStyle = "#7c5cfc"; ctx.shadowBlur = 15*pulse; ctx.shadowColor="#7c5cfc";
  ctx.beginPath(); ctx.arc(pos[0], pos[1], 10*pulse, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0; ctx.fillStyle="#fff"; ctx.font="bold 10px Space Mono"; ctx.textAlign="center"; ctx.fillText(f.r, pos[0], pos[1]+4);
}

function toggleAll() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('playBtn');
  if(isPlaying) {
    btn.textContent = '⏸ 중지';
    Object.values(trackPlayers).forEach(p => p.play());
    pulseInterval = setInterval(() => {
        drawFretboard(DIET_DATA[currentChordIdx].fret, 1.3);
        setTimeout(() => drawFretboard(DIET_DATA[currentChordIdx].fret, 1), 150);
    }, 600);
  } else {
    btn.textContent = '▶ 연주 시작';
    Object.values(trackPlayers).forEach(p => p.pause());
    clearInterval(pulseInterval);
  }
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  if(this.files.length > 0) {
    document.getElementById('uploadText').textContent = this.files[0].name;
    document.getElementById('btnAnalyze').disabled = false;
  }
});
</script>
</body>
</html>
